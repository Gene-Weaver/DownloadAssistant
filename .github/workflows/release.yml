name: Release

# Build + publish the Electron app to GitHub Releases (electron-builder),
# emitting electron-updater metadata (latest.yml / latest-mac.yml / latest-linux.yml).
#
# Push a version tag (e.g. `git tag v0.1.0 && git push --tags`) to build all three
# platforms and upload them to a DRAFT GitHub Release for that tag. Review the
# draft, then hit "Publish release" in the GitHub UI — electron-updater only sees
# published (non-draft) releases. A manual "Run workflow" (workflow_dispatch)
# builds without publishing, so you can smoke-test the packaging.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# electron-builder (--publish always) needs this to create/update the Release
# and upload artifacts with the built-in GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is Apple Silicon; the x64 slice is cross-built here.
          - os: macos-latest
            build_args: '--mac --arm64 --x64'
          - os: windows-latest
            build_args: '--win --x64'
          - os: ubuntu-latest
            build_args: '--linux AppImage --x64'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci runs the postinstall (electron-builder install-app-deps), which
      # rebuilds native modules (better-sqlite3, sharp) for Electron's ABI.
      - name: Install dependencies
        run: npm ci

      # Publish only when the ref is a tag; a manual dispatch just builds.
      - name: Build and publish
        run: npx --no-install electron-builder ${{ matrix.build_args }} --publish ${{ github.ref_type == 'tag' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ---- Code signing (optional; empty when the secret is unset) --------
          # macOS: Developer ID cert (.p12 base64) + notarization creds. Required
          # for macOS auto-update to work at all. Windows: same CSC_* pair signs
          # Authenticode on the Windows runner. Absent secrets -> unsigned build
          # that still succeeds (Win/Linux still auto-update; macOS will not).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Don't try to auto-find a keychain identity when no cert was provided.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
